name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # fission-utils release tag — update when a new utils bundle is published
  FISSION_UTILS_TAG: assets-v1

jobs:
  build-and-deploy:
    name: Build WASM + Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fission-web
        uses: actions/checkout@v4

      # ── Rust / WASM toolchain ─────────────────────────────────────────────

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + git deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Dioxus CLI
        run: |
          # Use binstall for fast binary install (no source compilation)
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh \
            | bash
          cargo binstall dioxus-cli --no-confirm

      # ── fission-utils (sleigh specs + signatures) ─────────────────────────

      - name: Download fission-utils bundle
        run: |
          curl -fsSL \
            "https://github.com/fission-systems/Fission/releases/download/${{ env.FISSION_UTILS_TAG }}/fission-utils.tar.gz" \
            | tar -xz -C ./
          echo "FISSION_SLEIGH_SPEC_DIR=$PWD/utils/sleigh-specs" >> $GITHUB_ENV

      # ── Build ─────────────────────────────────────────────────────────────

      - name: Cargo check (wasm32) — show real errors
        run: cargo build --target wasm32-unknown-unknown --release 2>&1

      - name: Build WASM (release)
        run: dx build --platform web --release

      # ── Deploy ────────────────────────────────────────────────────────────

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (preview)
        if: github.event_name == 'pull_request'
        run: |
          vercel deploy dist/ \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel (production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          vercel deploy dist/ --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }}
